    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
      <title id="title">Enterprise AI camera-to-decision reference architecture</title>
      <desc id="desc">Realistic vector scene based on the project workflow, with synthetic labels and no confidential client data.</desc>
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#03101d"/><stop offset="0.56" stop-color="#07192b"/><stop offset="1" stop-color="#160f2c"/></linearGradient>
        <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#42e8e0"/><stop offset="1" stop-color="#7dd3fc"/></linearGradient>
        <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#9f7aea"/><stop offset="1" stop-color="#f0abfc"/></linearGradient>
        <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f59e0b"/><stop offset="1" stop-color="#fef08a"/></linearGradient>
        <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#22c55e"/><stop offset="1" stop-color="#86efac"/></linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse"><path d="M36 0H0V36" fill="none" stroke="#8bc8df" stroke-opacity=".08"/></pattern>
        <style>
          .bg{fill:url(#bg)}.grid{fill:url(#grid)}.panel{fill:rgba(8,24,42,.78);stroke:#52d7e6;stroke-opacity:.33;stroke-width:1.2}.panel2{fill:rgba(21,17,42,.72);stroke:#a78bfa;stroke-opacity:.36;stroke-width:1.2}.line{stroke:#42e8e0;stroke-width:2;stroke-linecap:round;stroke-opacity:.75}.muted{stroke:#8bc8df;stroke-opacity:.25}.box{fill:none;stroke:#42e8e0;stroke-width:2;filter:url(#glow)}.warn{fill:none;stroke:#f59e0b;stroke-width:2.5;filter:url(#glow)}.danger{fill:none;stroke:#fb7185;stroke-width:2.5;filter:url(#glow)}.txt{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#e6fbff;font-size:15px;font-weight:750}.small{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#9eb7c9;font-size:10px;font-weight:650;letter-spacing:.02em}.tiny{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#9eb7c9;font-size:8.5px;font-weight:700;letter-spacing:.03em}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#7df9ff;font-size:10px;font-weight:800;letter-spacing:.05em}.chip{fill:rgba(66,232,224,.11);stroke:#42e8e0;stroke-opacity:.42}.viochip{fill:rgba(159,122,234,.12);stroke:#a78bfa;stroke-opacity:.45}.ok{fill:rgba(34,197,94,.14);stroke:#22c55e;stroke-opacity:.45}.bad{fill:rgba(244,63,94,.14);stroke:#fb7185;stroke-opacity:.55}.amb{fill:rgba(245,158,11,.13);stroke:#f59e0b;stroke-opacity:.55}.shadow{filter:drop-shadow(0 18px 30px rgba(0,0,0,.35))}
        </style>
      </defs>
      <rect class="bg" width="900" height="520" rx="0"/>
      <rect class="grid" width="900" height="520"/>
      <circle cx="162" cy="62" r="160" fill="#42e8e0" opacity=".07"/>
      <circle cx="756" cy="447" r="190" fill="#9f7aea" opacity=".08"/>

<text x="34" y="42" class="mono">REFERENCE ARCHITECTURE • BANGLADESH FIELD AI → DECISION LAYER</text>
<g class="shadow">
  <rect x="32" y="68" width="836" height="382" rx="24" class="panel"/>
  <g transform="translate(58 105)"><text class="mono">FIELD INPUTS</text><rect y="22" width="118" height="56" rx="12" class="chip"/><text x="13" y="43" class="tiny">Bank / ATM CCTV</text><text x="13" y="59" class="tiny">branch rules</text><rect y="91" width="118" height="56" rx="12" class="viochip"/><text x="13" y="112" class="tiny">Factory SOP</text><text x="13" y="128" class="tiny">PPE / safety</text><rect y="160" width="118" height="56" rx="12" class="chip"/><text x="13" y="181" class="tiny">Port / yard</text><text x="13" y="197" class="tiny">OCR / movement</text><rect y="229" width="118" height="56" rx="12" class="viochip"/><text x="13" y="250" class="tiny">Parking / FRS</text><text x="13" y="266" class="tiny">identity events</text></g>
  <g transform="translate(212 118)"><text class="mono">STREAM + EDGE</text><rect y="37" width="118" height="88" rx="15" class="panel2"/><text x="17" y="62" class="tiny">RTSP / ONVIF</text><text x="17" y="80" class="tiny">NVR / Mobile</text><text x="17" y="98" class="tiny">Reconnect</text><rect y="158" width="118" height="88" rx="15" class="panel2"/><text x="17" y="183" class="tiny">Jetson / GPU</text><text x="17" y="201" class="tiny">health signals</text><text x="17" y="219" class="tiny">watchdog</text></g>
  <g transform="translate(366 118)"><text class="mono">AI RUNTIME</text><rect y="37" width="130" height="54" rx="13" class="chip"/><text x="18" y="59" class="tiny">Detection / Pose</text><text x="18" y="75" class="tiny">Tracking / Re-ID</text><rect y="105" width="130" height="54" rx="13" class="chip"/><text x="18" y="127" class="tiny">OCR / ANPR</text><text x="18" y="143" class="tiny">Face verify</text><rect y="173" width="130" height="54" rx="13" class="chip"/><text x="18" y="195" class="tiny">Voice / VLM</text><text x="18" y="211" class="tiny">quality models</text></g>
  <g transform="translate(538 118)"><text class="mono">EVENT LAYER</text><rect y="37" width="124" height="88" rx="15" class="panel2"/><text x="17" y="62" class="tiny">temporal rules</text><text x="17" y="80" class="tiny">evidence snap</text><text x="17" y="98" class="tiny">API payload</text><rect y="158" width="124" height="88" rx="15" class="panel2"/><text x="17" y="183" class="tiny">human review</text><text x="17" y="201" class="tiny">false-alert loop</text><text x="17" y="219" class="tiny">audit trail</text></g>
  <g transform="translate(704 118)"><text class="mono">OPERATIONS</text><rect y="37" width="132" height="76" rx="15" class="ok"/><text x="18" y="61" class="tiny">SOC dashboard</text><text x="18" y="79" class="tiny">alerts / reports</text><text x="18" y="97" class="tiny">branch feedback</text><rect y="133" width="132" height="76" rx="15" class="amb"/><text x="18" y="157" class="tiny">UAT / KPI</text><text x="18" y="175" class="tiny">latency + accuracy</text><text x="18" y="193" class="tiny">rollout control</text><rect y="229" width="132" height="44" rx="14" class="bad"/><text x="18" y="256" class="tiny">privacy gates</text></g>
  <path d="M176 258h36M330 258h36M496 258h42M662 258h42" class="line"/>
  <path d="M176 155h36M330 183h36M496 183h42M662 183h42" class="line" opacity=".5"/>
  <text x="58" y="427" class="small">No confidential screenshots: visuals are synthetic, project-specific, and safe for public portfolio use.</text>
</g>

    </svg>
